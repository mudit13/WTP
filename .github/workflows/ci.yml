name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # CPU-only: install the lightweight analysis deps + pytest. torch/clip/diffusers are
      # provided inside the GPU container and are intentionally NOT installed here, so the
      # tests cover the pure-Python logic (schema, image ops, metrics, io/config) only.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Byte-compile all scripts and tests
        run: python -m compileall -q scripts tests

      - name: Run smoke tests
        run: pytest -q
