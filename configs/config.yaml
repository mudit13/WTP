# Central configuration for the WTP Topic 8 pipeline.
# Aligned with the EXISTING server layout (github.com/mudit13/WTP):
#   dataset root: ${WTP_ROOT}/dataset   (host: .../sharedDockerDir/dataset)
#   master CSV schema: filename, full_path, label, generator, category, source_dataset, width, height
# Paths use ${VAR} placeholders resolved from configs/paths.env (or the real environment).

root: ${WTP_ROOT}                       # /pitsec_sose26_topic8 inside the container
dataset_root: ${WTP_ROOT}/dataset
master_csv: ${WTP_ROOT}/dataset/master_metadata.csv
predictions_all: ${WTP_ROOT}/dataset/defake_predictions_all.csv

# Common working size for the preprocessing study (DE-FAKE squashes to 224 internally; we
# standardize on-disk variants so the scaling-vs-cropping comparison is clean).
# 256 chosen deliberately: sources range 178 (CelebA) -> 299 (DFFD) -> 512 (ours) -> 1350
# (London-DB). 256 is near DFFD-native and DE-FAKE's 224, so it mostly DOWNSCALES (safer)
# and avoids the heavy upscaling/interpolation artifacts that 512 would add to CelebA/DFFD.
common_size: 256
output_format: png                      # lossless derived images (GOLD concern #2)

# Training-time augmentation to control the format/compression confound.
# Source formats correlate with label (JPEG appears only in reals: CelebA + London-DB;
# all fakes are PNG). Re-encoding JPEG->PNG does NOT remove baked-in JPEG artifacts, so we
# apply random JPEG compression to ALL classes during detector/attribution TRAINING so
# "has been JPEG-compressed" can no longer leak the label (Frank 2020 / Wang 2020).
augmentation:
  jpeg_train: true
  jpeg_quality_range: [30, 100]

# --- Datasets (mirror build_master_index.py + update_master_index_dffd.py) ----
# Each entry: name(=source_dataset), label, generator(human name), category, dir, ext list.
# Optional: sample_size, exclude_glob, note. build_master_index.py skips missing dirs.
datasets:
  - name: sd15_txt2img
    label: fake
    generator: "SD1.5"
    category: near_in_set
    dir: ${WTP_ROOT}/dataset/sd15_txt2img/images
    ext: [".png"]
    note: "Near in-set proxy for DE-FAKE (diffusion family)."

  - name: sd15_img2img
    label: fake
    generator: "SD1.5-img2img"
    category: out_of_set
    dir: ${WTP_ROOT}/dataset/sd15_img2img/images
    ext: [".png"]
    note: "Iterative-generation stress test. NOT GENERATED for this run (no images exist under
      this dir; absent from the section 2/3 dataset table and every reported result). Entry
      kept so the config stays self-documenting about what was scoped out vs. what would need
      a generation run to add. build_master_index.py skips it silently since the dir is empty."

  - name: flux1_txt2img
    label: fake
    generator: "FLUX.1-schnell"
    category: out_of_set
    dir: ${WTP_ROOT}/dataset/flux1_txt2img/images
    ext: [".png"]
    note: "Out-of-set modern diffusion generator."

  - name: stylegan3
    label: fake
    generator: "StyleGAN3-FFHQ"
    category: out_of_set
    dir: ${WTP_ROOT}/dataset/stylegan3/images
    ext: [".png"]
    note: "Out-of-set GAN face generator."

  - name: londondb
    label: real
    generator: "London-DB"
    category: real
    dir: ${WTP_ROOT}/dataset/londondb/neutral_front/neutral_front
    ext: [".jpg"]
    note: "Face Research Lab London Set, neutral_front only -> very narrow real cluster."

  - name: celeba_real
    label: real
    generator: "CelebA"
    category: real
    dir: ${WTP_DFFD_DIR}/img_align_celeba
    ext: [".jpg"]
    sample_size: 320
    note: "Aligned CelebA real faces (web-crawled). Balances real class + adds a capture
      condition distinct from FFHQ (Flickr) and London-DB (studio). 202k available."

  - name: openforensics_real
    label: real
    generator: "OpenForensics"
    category: real
    dir: ${WTP_ROOT}/dataset/openforensics/real
    ext: [".png", ".jpg"]
    sample_size: 300
    note: "In-the-wild faces (real subset). A TRAINED real attribution class that diversifies the
      narrow real class (GOLD concern #1; Dennis strongly advised adding OpenForensics reals). Capped
      at 300 to size-match the other real classes (FFHQ 300 / CelebA 320) so the thousands of OF crops
      do not swamp them. Also used for DETECTION; same-photo pairs with openforensics_fake give a
      format-matched (JPEG q95) confound benchmark. Skipped if absent."

  - name: openforensics_fake
    label: fake
    generator: "OpenForensics-fake"
    category: out_of_set
    dir: ${WTP_ROOT}/dataset/openforensics/fake
    ext: [".png", ".jpg"]
    sample_size: 300
    note: "OpenForensics manipulated faces (fake subset). Kept OUT-OF-SET (a genuinely unseen
      manipulation type = clean generalization probe); distinct generator name from the real subset
      so the attribution taxonomy stays real/fake-exclusive. Capped at 300 to balance the OF real
      class. Cropped from the SAME source photos as the reals (shared JPEG q95 pipeline) -> format
      confound-safe by construction. Skipped if absent."

  # --- DFFD (from /share/DeepFake/DFFD_Images/<model>/test) -------------------
  - name: dffd_ffhq
    label: real
    generator: "FFHQ"
    category: real
    dir: ${WTP_DFFD_DIR}/ffhq/test
    ext: [".png", ".jpg"]
    sample_size: 300
    note: "DFFD real subset (FFHQ, Flickr faces). Bumped 100->300 to balance the real class
      (9000 available in ffhq/test)."

  - name: dffd_pggan_v1
    label: fake
    generator: "PGGAN-v1"
    category: out_of_set
    dir: ${WTP_DFFD_DIR}/pggan_v1/test
    ext: [".png", ".jpg"]
    sample_size: 100

  - name: dffd_pggan_v2
    label: fake
    generator: "PGGAN-v2"
    category: out_of_set
    dir: ${WTP_DFFD_DIR}/pggan_v2/test
    ext: [".png", ".jpg"]
    sample_size: 100

  - name: dffd_stargan
    label: fake
    generator: "StarGAN"
    category: out_of_set
    dir: ${WTP_DFFD_DIR}/stargan/test
    ext: [".png", ".jpg"]
    sample_size: 100

  - name: dffd_faceapp
    label: fake
    generator: "FaceApp"
    category: out_of_set
    dir: ${WTP_DFFD_DIR}/faceapp/test
    ext: [".png", ".jpg"]
    sample_size: 100

# --- Attribution label space (human generator names) -------------------------
# NOTE: the provided DE-FAKE head (clip_linear.pt) is BINARY only (real/fake). There is no
# pretrained multi-class attribution; attribution is produced by our fine-tuned head.
#
# TAXONOMY (must stay consistent - the code enforces it):
#   real_generators       -> real sources; labeled 'real', EXCLUDED from attribution scoring.
#   in_set_generators      -> fake generators the fine-tuned head is TRAINED on.
#   finetune_new_classes   -> fake generators ADDED as trained classes (subset of the trained
#                             fake set); listed separately only to document what we added.
#   TRAINED FAKE CLASSES   = in_set_generators UNION finetune_new_classes  (these are "in-set").
#   out_of_set_generators  -> GENUINELY UNSEEN generators: never trained, only force-scored to
#                             measure closed-set failure (false-known rate / entropy). Do NOT
#                             put a trained generator here or the "out-of-set" number is a lie.
# leave_one_generator_out.py gives the strict generalization number by RETRAINING without a
# target, so it may hold out in-set generators too (pass them via --targets).
attribution:
  # OpenForensics is split by subset, on purpose:
  #   - OF REALS  -> a TRAINED real class (listed in real_generators below). This is the direct
  #     answer to GOLD concern #1 / Dennis's strongest steer: diversify the narrow real class with
  #     in-the-wild faces. Capped (sample_size 300) so it size-matches the other real classes.
  #   - OF FAKES  -> kept OUT-OF-SET ("OpenForensics-fake"): a genuinely unseen manipulation type,
  #     so it stays a clean generalization probe (never trained, only force-scored).
  # The same-photo OF real/fake pairs (shared JPEG q95 pipeline) still serve as the format-matched
  # DETECTION confound benchmark. Trade-off: OF reals are no longer a held-out real probe (the
  # diversify intent wins for the real side); OF-fake remains the held-out fake probe.
  real_generators: ["London-DB", "FFHQ", "CelebA", "OpenForensics"]
  in_set_generators: ["SD1.5"]
  finetune_new_classes: ["FLUX.1-schnell", "StyleGAN3-FFHQ"]
  out_of_set_generators: ["PGGAN-v1", "PGGAN-v2", "StarGAN", "FaceApp", "SD1.5-img2img", "OpenForensics-fake"]

# --- GAN Fingerprints (Yu2019-inspired) re-implementation --------------------
# Residual/spectrum fingerprint features + a small learned classifier
# (defake_head._MLPHead). Second attribution method beside the CLIP/DE-FAKE head; targets
# the GAN-specific traces DE-FAKE cannot attribute (StyleGAN3, DFFD families). Diffusion
# sources are expected to mismatch (out-of-set). See scripts/lib/ganfp.py +
# scripts/train_ganfp.py. Reproduction mandated by GOLD_ALIGNMENT.md / PROJECT_LOG section 5.
ganfp:
  common_size: 256        # image resize before fingerprint extraction (luminance)
  feat_size: 32           # each fingerprint block downsampled to feat_size x feat_size
  mode: both              # residual | spectrum | both
  epochs: 40
  lr: 0.001
  # CNN path (Path B, scripts/lib/ganfp_net.py): Yu2019-INSPIRED CNN (not a byte-faithful
  # port) with a FIXED SRM high-pass front-end (Fridrich & Kodovsky 2012, 30 filters) + 3 VGG
  # conv blocks + GAP + linear. ~330K trainable params at the code default channels
  # [32,64,128]; the channels below ([16,32,64], ~82K) are the sweep winner. Trains in minutes
  # on CUDA (RTX 4050, batch 32).
  cnn:
    input_size: 256       # single-channel luminance input (H=W)
    channels: [16, 32, 64]  # SWEEP WINNER on the 1626 set (val_top1=0.736; [32,64,128]=0.718, [48,96,192] overfits -> DNF)
    epochs: 60            # bumped from 30 for the bigger head
    lr: 0.001
    weight_decay: 0.0001
    hflip: true           # training-only random horizontal flip (p=0.5, seeded)
  # PCA / standardization pipeline (Path A, scripts/lib/ganfp.py FingerprintStandardizer).
  # Scaler + PCA are fit on TRAIN ONLY (no leakage). DCT fusion is an OPTIONAL additive
  # second channel (8x8 block-DCT -> 32-dim PCA) concatenated after the residual+spectrum
  # PCA vector; default off so the benchmark can isolate whether DCT adds signal.
  pca:
    components: 64        # residual+spectrum PCA dimensionality (in_dim without DCT)
    dct_fuse: false       # enable the additive DCT fusion channel
    dct_components: 32    # DCT PCA dimensionality when dct_fuse is true (in_dim = 64+32=96)

# --- Robustness perturbations (held-out test images only) --------------------
robustness:
  jpeg_quality: [30, 50, 70]
  gaussian_blur_sigma: [1, 2]
  resize_factors: [0.5, 0.75]
  sharpen: [1.0]

# --- Reproducibility ---------------------------------------------------------
seed: 42
test_size: 0.2
val_size: 0.1
